<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 260" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="aurabg" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#0a4080" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" x2="0" y1="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="hugeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="260" fill="#000308"/>
  <ellipse cx="550" cy="135" rx="550" ry="130" fill="url(#aurabg)">
    <animate attributeName="rx" values="550;620;550" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- rising flame embers -->
  <g>
    <rect x="100" y="240" width="2" height="22" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="200" y="240" width="2" height="26" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.8s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="320" y="240" width="2" height="20" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.3s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.3s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
    <rect x="450" y="240" width="2" height="28" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="3s" repeatCount="indefinite" begin="0.1s"/>
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0.1s"/>
    </rect>
    <rect x="580" y="240" width="2" height="22" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <rect x="700" y="240" width="2" height="24" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="830" y="240" width="2" height="26" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.7s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.7s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <rect x="950" y="240" width="2" height="20" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.5s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <rect x="1020" y="240" width="2" height="22" fill="url(#flame)">
      <animate attributeName="y" values="240;-30" dur="2.6s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
  </g>

  <!-- A R I S E — letters drop in one by one -->
  <g filter="url(#hugeGlow)" font-family="Cinzel, Trajan Pro, Georgia, serif"
     font-size="105" font-weight="900" fill="#00e6ff" text-anchor="middle" letter-spacing="22">
    <text x="350" y="165" opacity="0">A
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="450" y="165" opacity="0">R
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="550" y="165" opacity="0">I
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="650" y="165" opacity="0">S
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </text>
    <text x="750" y="165" opacity="0">E
      <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    </text>
  </g>

  <!-- pulsing outline echo -->
  <text x="550" y="165" font-family="Cinzel, Georgia, serif" font-size="105" font-weight="900"
        fill="none" stroke="#00d4ff" stroke-width="0.6" text-anchor="middle" letter-spacing="22" opacity="0">ARISE
    <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="2s" repeatCount="indefinite"/>
  </text>

  <!-- subtitle -->
  <text x="550" y="215" font-family="Courier New, monospace" font-size="14" letter-spacing="12"
        fill="#ffffff" text-anchor="middle" opacity="0">
    THE  CODE  OBEYS  ·  THE  SHADOWS  ANSWER
    <animate attributeName="opacity" values="0;0.85" begin="1.9s" dur="0.7s" fill="freeze"/>
  </text>
</svg>
