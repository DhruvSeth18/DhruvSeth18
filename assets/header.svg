<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#000308"/>
      <stop offset="55%" stop-color="#040818"/>
      <stop offset="100%" stop-color="#021530"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#centerGlow)"/>

  <!-- perspective grid floor -->
  <g stroke="#00d4ff" fill="none" opacity="0.28">
    <path stroke-width="0.6" d="M0 280 L1200 280 M0 295 L1200 295 M0 312 L1200 312 M0 332 L1200 332"/>
    <path stroke-width="0.5" d="M600 270 L0 340 M600 270 L120 340 M600 270 L260 340 M600 270 L420 340 M600 270 L600 340 M600 270 L780 340 M600 270 L940 340 M600 270 L1080 340 M600 270 L1200 340"/>
  </g>

  <!-- corner brackets, pulsing -->
  <g stroke="#00d4ff" stroke-width="2.5" fill="none" filter="url(#glow)">
    <path d="M22 22 L22 70 M22 22 L70 22"/>
    <path d="M1178 22 L1178 70 M1178 22 L1130 22"/>
    <path d="M22 250 L22 202 M22 250 L70 250"/>
    <path d="M1178 250 L1178 202 M1178 250 L1130 250"/>
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
  </g>

  <!-- top status strip -->
  <text x="600" y="60" font-family="Courier New, monospace" font-size="13" letter-spacing="8"
        fill="#6b9eff" text-anchor="middle">
    [ INCOMING TRANSMISSION ]
    <animate attributeName="opacity" values="1;0.25;1" dur="1.5s" repeatCount="indefinite"/>
  </text>

  <!-- chromatic aberration ghosts -->
  <text x="603" y="158" font-family="Impact, Arial Black, sans-serif" font-size="92" font-weight="900"
        fill="#ff0088" text-anchor="middle" letter-spacing="14" opacity="0">⟪ SYSTEM ⟫
    <animate attributeName="opacity" values="0;0;0.45;0;0;0;0.35;0;0"
             keyTimes="0;0.3;0.32;0.36;0.5;0.7;0.72;0.76;1" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="597" y="158" font-family="Impact, Arial Black, sans-serif" font-size="92" font-weight="900"
        fill="#00ff88" text-anchor="middle" letter-spacing="14" opacity="0">⟪ SYSTEM ⟫
    <animate attributeName="opacity" values="0;0;0.4;0;0;0;0.3;0;0"
             keyTimes="0;0.3;0.32;0.36;0.5;0.7;0.72;0.76;1" dur="5s" repeatCount="indefinite"/>
  </text>

  <!-- main SYSTEM title, glitch jitter -->
  <g filter="url(#bigGlow)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,0; 3,-2; -3,1; 0,0; 0,0; 0,0; 2,1; -1,0; 0,0"
      keyTimes="0; 0.3; 0.32; 0.34; 0.36; 0.6; 0.7; 0.72; 0.74; 1"
      dur="5s" repeatCount="indefinite"/>
    <text x="600" y="158" font-family="Impact, Arial Black, sans-serif" font-size="92" font-weight="900"
          fill="#00e6ff" text-anchor="middle" letter-spacing="14">⟪ SYSTEM ⟫</text>
  </g>

  <!-- subtitle -->
  <text x="600" y="205" font-family="Courier New, monospace" font-size="18" letter-spacing="4"
        fill="#ffffff" text-anchor="middle">
    ≫  A NEW PLAYER HAS ENTERED THE GATE  ≪
  </text>

  <!-- prompt blink -->
  <text x="600" y="240" font-family="Courier New, monospace" font-size="13" letter-spacing="10"
        fill="#00d4ff" text-anchor="middle">
    [  PRESS  ▼  TO  CONTINUE  ]
    <animate attributeName="opacity" values="1;0.15;1" dur="1.1s" repeatCount="indefinite"/>
  </text>

  <!-- scan line -->
  <rect x="0" y="-4" width="1200" height="2" fill="#00d4ff" opacity="0.55">
    <animate attributeName="y" from="-4" to="340" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- floating particles -->
  <g fill="#00d4ff">
    <circle cx="120" cy="120" r="1.6">
      <animate attributeName="cy" values="120;60;120" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="180" r="2">
      <animate attributeName="cy" values="180;110;180" dur="5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="900" cy="140" r="1.6">
      <animate attributeName="cy" values="140;80;140" dur="4.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;0" dur="4.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="1080" cy="170" r="2">
      <animate attributeName="cy" values="170;100;170" dur="5.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;1;0" dur="5.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="200" cy="220" r="1.2">
      <animate attributeName="cy" values="220;150;220" dur="3.5s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="780" cy="210" r="1.6">
      <animate attributeName="cy" values="210;140;210" dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;1;0" dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="450" cy="100" r="1.4">
      <animate attributeName="cy" values="100;50;100" dur="4.8s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0;1;0" dur="4.8s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>
</svg>
